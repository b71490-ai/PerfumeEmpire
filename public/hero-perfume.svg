<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ea" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f3e1b8" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#c6a75e"/>
      <stop offset="1" stop-color="#7a5b2a"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Transparent background -->
  <rect width="100%" height="100%" fill="none" />

  <!-- Bottle shadow -->
  <g transform="translate(60,80)">
    <ellipse cx="196" cy="300" rx="128" ry="22" fill="#000" opacity="0.08"/>

    <!-- Bottle body -->
    <g filter="url(#shadow)">
      <rect x="96" y="40" width="200" height="280" rx="36" ry="36" fill="url(#g1)" stroke="rgba(0,0,0,0.06)" stroke-width="2"/>
    </g>

    <!-- Bottle inner glass highlight -->
    <path d="M120 60 C120 30, 280 30, 280 60 L280 280 C280 310, 120 310, 120 280 Z" fill="rgba(255,255,255,0.18)" />

    <!-- Liquid level -->
    <path d="M120 220 C160 240, 240 240, 280 220 L280 280 C280 295, 120 295, 120 280 Z" fill="#fde7c9" opacity="0.95" />

    <!-- Cap -->
    <rect x="152" y="-10" width="104" height="36" rx="8" fill="url(#g2)" />
    <rect x="168" y="10" width="72" height="10" rx="5" fill="#d0af6c" opacity="0.95" />

    <!-- Label -->
    <rect x="156" y="120" width="100" height="64" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(0,0,0,0.04)"/>
    <text x="206" y="152" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" fill="#2b1b2b">EMPIRE</text>

    <!-- Decorative gold outline -->
    <rect x="96" y="40" width="200" height="280" rx="36" ry="36" fill="none" stroke="url(#g2)" stroke-width="3" opacity="0.85"/>
  </g>
</svg>
